services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: fraud_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: ["5433:5432"]  # только для локальной разработки
    networks: [fraud-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fraud_db"]
      interval: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports: ["29092:29092"]  # только для локальной отладки (kcat, Kafka UI)
    networks: [fraud-net]
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports: ["8080:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: [kafka]
    networks: [fraud-net]

  transaction-service:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:${POSTGRES_PASSWORD}@postgres/fraud_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}
    networks: [fraud-net]

  fraud-detector:
    build:
      context: .
      dockerfile: services/fraud-detector/Dockerfile
    ports: ["8001:8001"]
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:${POSTGRES_PASSWORD}@postgres/fraud_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}
    networks: [fraud-net]

  limits-service:
    build:
      context: .
      dockerfile: services/limits-service/Dockerfile
    ports: ["8002:8002"]
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:${POSTGRES_PASSWORD}@postgres/fraud_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}
    networks: [fraud-net]

  notify-service:
    build: ./services/notify-service
    ports: ["8003:8003"]
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:${POSTGRES_PASSWORD}@postgres/fraud_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WEBHOOK_URL: ${WEBHOOK_URL}
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}
    networks: [fraud-net]

  admin-api:
    build: ./services/admin-api
    ports: ["8004:8004"]
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:${POSTGRES_PASSWORD}@postgres/fraud_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}
    networks: [fraud-net]

networks:
  fraud-net:
    driver: bridge

volumes:
  postgres_data:
